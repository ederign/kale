name: Build Kale Jupyter Labextension

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          SKIP_JUPYTER_BUILDER=1 uv sync --all-extras --frozen
          cd labextension && uv run jlpm install

      - name: Lint labextension
        run: make lint-labextension

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          SKIP_JUPYTER_BUILDER=1 uv sync --all-extras --frozen
          cd labextension && uv run jlpm install

      - name: Build labextension
        run: |
          cd labextension && uv run jlpm build:prod

      - name: Register extension for verification
        run: uv run jupyter labextension develop --overwrite .

      - name: Verify extension
        run: |
          uv run jupyter labextension list
          uv run jupyter labextension list 2>&1 | grep -ie "jupyterlab-kubeflow-kale.*OK"
          uv run python -m jupyterlab.browser_check
