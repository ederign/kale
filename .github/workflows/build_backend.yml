name: Kale Backend CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node is required by make dev (builds the JupyterLab extension)
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up development environment
        run: make dev

      - name: Run backend tests
        run: make test-backend

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node is required by make dev (builds the JupyterLab extension)
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up development environment
        run: make dev

      - name: Lint backend
        run: make lint-backend
